    replies:
      reply-1773003128001-claude:
        id: reply-1773003128001-claude
        author: claude
        timestamp: 2026-03-08T20:52:08Z
        text: |
          Totally makes sense. A few things worth knowing as you plan the App Store path:

          1. **PWA banner is naturally a no-op on iOS** — the `beforeinstallprompt` event is a Chrome/Android API that Safari never fires, so the banner simply won't appear for iOS users even if we ship it. No conflict.
          2. **For the App Store**, the most practical approach with the existing Vite/React codebase is to wrap it in a **Capacitor** shell (Ionic's native bridge). Capacitor adds a thin Swift/Kotlin wrapper around a WKWebView, lets you keep all your existing code, and produces a proper `.ipa` for App Store submission. Minimal rewrite required.
          3. **PWA still matters for Android/desktop web** even after an iOS native app ships — so the install prompt feature has a valid audience on those platforms.

          Recommend: keep the PWA banner feature for non-iOS platforms, and track the App Store native wrapper as a separate workstream when you're ready for that investment. We can note this in the feature spec.
      reply-1773003451437-9w4k8n:
        id: reply-1773003451437-9w4k8n
        author: 9w4k8n
        timestamp: 2026-03-08T20:57:31.436Z
        text: Sounds good.
