        timestamp: 2026-03-08T20:52:08Z
        text: |
          Yes — infinite history is a great premium hook! I've updated the Open Questions section in the memo with decisions on all seven items. Here's the summary:

          1. **Putt log scope** — Infinite history with round separation becomes a *premium feature*. Free tier shows last 3 rounds; premium unlocks full history + export. Clean upsell.
          2. **Calibration profiles** — Named profiles UX is the right shape. A lightweight "quick adjust" nudge (±10%) on the main page can complement the full Calibrate flow for on-the-fly tweaks.
          3. **Units toggle** — Global setting persisted to localStorage. Aim output (inches) converts to cm in metric mode — metric users shouldn't have to convert in their head.
          4. **ZBL variance** — Ship inline text first (`3" ±1"` beneath the aim value). Reserve the clock SVG visual band for a later polish pass.
          5. **Ruler export** — SVG wins: vector, DXF-compatible for laser engravers, no extra dependencies. Print as landscape 8.5×11 pages, tiled if needed.
          6 & 7. **Ruler order flow & Priority** — Marked "not determined yet" in the memo. I added a suggested sequencing by effort/impact as a starting point.
