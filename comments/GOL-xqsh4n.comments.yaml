        text: |
          Great question to flag. The variance data itself comes from the Bryson slope table, which is already publicly known in the golfing community — showing it doesn't give away anything proprietary. What makes ZeroBreak special is the *integration*: personal distanceFactor calibration + ZBL aim + the body-landmark system, all unified in one tool. Surfacing the variance band actually *reinforces* the sophistication of the system in the user's mind rather than giving anything away.

          That said, if you'd prefer to keep it lower-profile, we could make variance display optional — off by default, togglable in Settings. That way power users who want the extra info can enable it, while the default experience stays clean and doesn't invite scrutiny of the underlying table. Happy to go either way — just let me know your preference.
