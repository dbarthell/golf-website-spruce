    text: |
      ## Review: Changes Requested

      The React + Vite + TypeScript migration (commit ddb98ec) is solid — the core of the work is well done. Business logic is cleanly extracted into typed `src/lib/` modules with no DOM references, hooks correctly manage localStorage persistence, the ClockFace SVG annotation overlay is geometrically accurate, and the TypeScript strict-mode build and production Vite build both pass. The migration itself gets a thumbs up.

      However, **the "Mantine Components Pass" section of the artifact describes work that was not implemented.** All seven components listed in that section still use custom HTML elements and CSS classes — not the Mantine primitives claimed:

      | Component | Artifact claims | What's actually in the code |
      |---|---|---|
      | `StimpToggle.tsx` | `SegmentedControl` | Custom `<button>` group in a `<div>` |
      | `DistanceInput.tsx` | `NumberInput` + `ActionIcon` + `Group` | Custom `<input>` + `<button>` with Tabler icons |
      | `SlopeInput.tsx` | `NumberInput` + `ActionIcon` + `Group` | Custom `<input>` + `<button>` with Tabler icons |
      | `CommonDistances.tsx` | `SimpleGrid` + `UnstyledButton` | Custom CSS grid `<div>` + `<button>` |
      | `LookupResult.tsx` | `Paper` | Plain `<div className="lookup-result">` |
      | `BackswingTable.tsx` | Mantine `Table` / `Table.Thead` / etc. | Plain HTML `<table>` |
      | `OnboardingModal.tsx` | Mantine `Modal` (fullScreen) + `Button` | Custom `<div className="onboarding-overlay">` |

      The `theme.ts` also does not contain the custom `xs`/`sm` breakpoints described in that section.

      The "Verified" claims at the bottom of the Mantine Components Pass section (tsc: 0 errors, vite build: 338 kB JS / 219 kB CSS) describe a build state that doesn't match the committed code (the actual build is 221 kB JS / 218 kB CSS per the Implementation Summary above it).

      **Action needed:**
      Either implement the Mantine component substitutions as described (SegmentedControl, NumberInput, ActionIcon, Paper, Mantine Table, SimpleGrid, UnstyledButton, Modal), or remove the "Mantine Components Pass" section from the artifact and acknowledge the components use custom CSS. The current state — a section claiming completion of work that wasn't done — is inaccurate.

      ---

      **Other minor findings (non-blocking):**

      1. **Uncommitted `js/mobile.js` changes** — `git status` shows this file has working-tree modifications (the sub-1% slope interpolation fix, removal of dead variables, clock localStorage persistence). These were applied to the legacy file as part of the earlier bug-fix round. The file isn't served by the React build, so these changes are stranded. They should be committed (for a clean history before the eventual deletion) or discarded.

      2. **`usePuttingData` is not a React hook** — it returns a module-level constant with no hook APIs called internally. Naming it `use*` violates the React hooks convention and will trigger `react-hooks/rules-of-hooks` ESLint warnings for any hook-rule checkers. Renaming to `getPuttingData` or `puttingData` would be accurate, or alternatively wrap the constant in a `useMemo` to make it legitimately hook-shaped.

      3. **Dead `showOnboarding` state in `LookupPage.tsx`** — `const [showOnboarding] = useState(...)` at line 136 computes a boolean but the value is never read — only used to initialize `onboardingDone` at line 137. The `useState` call is unnecessary; `onboardingDone` can be initialized directly: `useState(() => !!localStorage.getItem('zerobreak-onboarded'))`.

      4. **`window.location.hash = '#/'` in `CalibratePage.tsx` line 70** — the post-onboarding redirect uses imperative hash manipulation instead of `useNavigate('/')`. Works correctly with HashRouter but bypasses the navigation stack. The `OnboardingModal` already uses `useNavigate` correctly — worth making `CalibratePage` consistent.
