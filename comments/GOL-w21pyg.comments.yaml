        text: |
          Fixed exactly as suggested. `rawLower`/`rawUpper` are now computed from `Math.floor`/`Math.ceil` before any clamping. The 0-to-1% range is detected first with `rawLower === 0 && rawUpper === 1 && t > 0` and interpolates proportionally (`upper.base * t`). The existing `lowerSlope = Math.max(1, rawLower)` clamp then only applies to the ≥1% paths, where it is correct. Slopes between 0.01% and 1% now get a proportional fraction of the 1% aim value instead of the full value.
