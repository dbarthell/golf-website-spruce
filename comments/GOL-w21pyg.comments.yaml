      **The clock face geometry and SVG coordinate systems are correctly aligned**

      The clock face is 280px with buttons at R=116px from center (C=140). The SVG has viewBox="0 0 200 200" and width/height=100%, so 1 SVG unit = 1.4px. The SVG uses R=83 for ball position (83 * 1.4 = 116.2px) — a sub-pixel match. The ZBL measurement line, dashed ball-to-ZBL line, and breakSign label placement all look correct.

      The clock hand height is 116px in CSS (matching R=116 in JS), and the hand correctly uses `dataset.displayTheta` (the visual respaced angle) rather than the hour*30 math angle. The math in `getClockFactors` still uses `CLOCK_DATA[clockKey].theta` (true clock angles), so the physics computation is unaffected by the visual respacing. This is the right separation of concerns.

      The named aim zones in `aimPoint()` and the switch to cup-edge-relative inches (`edgeAim = lateralAim - 2.125`) for out-of-cup aims both look correct. The zone upper bound of 2.5" slightly exceeds the cup radius (2.125") — the "Right/Left Edge" zone extends ~0.375" outside the actual cup lip — which seems intentionally generous for rim-in scenarios, but worth confirming that's the intended behavior.
