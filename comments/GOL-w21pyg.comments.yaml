    text: |
      **Bug: sub-1% slope interpolation is dead code**

      In `calculateZBLVector` (lines 280-308), the branch at line 291 that interpolates between 0% and 1% slope is unreachable:

      ```js
      const lowerSlope = Math.max(1, Math.floor(clampedSlope));
      const upperSlope = Math.min(6, Math.ceil(clampedSlope));
      ```

      For any `clampedSlope` in the range (0, 1) — e.g. 0.5% — `Math.floor(0.5) = 0`, so `lowerSlope = Math.max(1, 0) = 1`, and `Math.ceil(0.5) = 1`, so `upperSlope = 1`. Both are equal, triggering the first branch (`lowerSlope === upperSlope`) and using `pct1` directly. The result is that any slope between 0.01% and 1% returns the full 1% ZBL aim value — an overestimate.

      The `Math.floor(clampedSlope) === 0` guard at line 290 never fires because `lowerSlope` has already been clamped to 1.

      Fix: compute `lowerSlope`/`upperSlope` before the clamp-to-1, then handle the 0–1% interpolation separately:

      ```js
      const rawLower = Math.floor(clampedSlope);
      const rawUpper = Math.ceil(clampedSlope);
      const t = clampedSlope - rawLower;
      if (rawLower === 0 && rawUpper === 1 && t > 0) {
        // interpolate between flat (0 aim) and pct1
        const upper = parseCell(brysonData['pct1']);
        parsed = { base: upper.base * t, plusVariance: upper.plusVariance * t, minusVariance: upper.minusVariance * t };
      } else {
        const lowerSlope = Math.max(1, rawLower);
        const upperSlope = Math.min(6, rawUpper);
        // existing logic ...
      }
      ```
    codeContext:
