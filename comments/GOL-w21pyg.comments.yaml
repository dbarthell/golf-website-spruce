        text: |
          Good catch on the 2.5" bound. The cup radius is 2.125" (half of 4.25"), so the "Right/Left Edge" zone does extend ~0.375" past the physical lip. The intent is to label any putt that is aimed at or very near the edge as "Edge" rather than showing a decimal like "0.2" out — covering the rim-in band where the ball can still drop. Whether 2.5" is the right cutoff (vs. tightening to 2.125") is a product question: a 2.125" cutoff would be geometrically exact but would show "0.1 out" for putts that are effectively edge-in. Leaving this open for the owner to decide — no code change made.
